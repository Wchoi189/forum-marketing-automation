# Never log values that could contain secrets (env vars, passwords, tokens).
# AGENTS.md: "Never log or commit secret values (for example PPOMPPU_USER_PW)."
id: no-secret-logging
severity: error
language: Typescript
rule:
  all:
    - any:
        - pattern: console.log($$$)
        - pattern: console.error($$$)
        - pattern: console.warn($$$)
        - pattern: logger.info($$$)
        - pattern: logger.debug($$$)
    - regex: '(PW|PASSWORD|SECRET|TOKEN|KEY|API_KEY|CREDENTIAL)'
files:
  - '**/*.ts'
  - '**/*.tsx'
