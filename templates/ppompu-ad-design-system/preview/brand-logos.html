<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body { margin: 0; padding: 16px; background: #f8fafc; font-family: "Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif; }
  h4 { margin: 0 0 12px 0; font-size: 11px; color: #94a3b8; letter-spacing: 0.05em; text-transform: uppercase; }
  .row { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .item { text-align: center; }
  .label { font-size: 10px; color: #94a3b8; margin-top: 6px; }
</style>
</head><body>
<h4>Logo Assets</h4>
<div class="row">
  <div class="item">
    <img src="../assets/logo-icon.png" style="height:64px;width:64px;object-fit:contain;border-radius:10px;" alt="SP icon">
    <div class="label">Icon (180×180)</div>
  </div>
  <div class="item">
    <img src="../assets/welcome-banner.png" style="height:64px;object-fit:contain;" alt="Welcome banner">
    <div class="label">Wordmark Banner</div>
  </div>
  <div class="item" style="background:#0f172a;padding:10px;border-radius:8px;">
    <img src="../assets/logo-wordmark-stylized.png" style="height:48px;object-fit:contain;" alt="Stylized wordmark">
    <div class="label" style="color:#94a3b8;">Stylized (dark bg)</div>
  </div>
</div>
</body></html>
