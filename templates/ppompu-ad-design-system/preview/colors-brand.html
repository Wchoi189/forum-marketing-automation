<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body { margin: 0; padding: 16px; background: #fff; font-family: "Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch { width: 80px; }
  .chip { width: 80px; height: 56px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.08); }
  .label { font-size: 10px; color: #334155; margin-top: 4px; font-weight: 600; }
  .hex { font-size: 10px; color: #94a3b8; font-family: monospace; }
  h4 { margin: 0 0 8px 0; font-size: 11px; color: #94a3b8; letter-spacing: 0.05em; text-transform: uppercase; }
</style>
</head><body>
<h4>Brand Colors</h4>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#0f172a;"></div><div class="label">Navy Dark</div><div class="hex">#0f172a</div></div>
  <div class="swatch"><div class="chip" style="background:#1e293b;"></div><div class="label">Navy</div><div class="hex">#1e293b</div></div>
  <div class="swatch"><div class="chip" style="background:#3a7d3a;"></div><div class="label">Green</div><div class="hex">#3a7d3a</div></div>
  <div class="swatch"><div class="chip" style="background:#e11d48;"></div><div class="label">Red</div><div class="hex">#e11d48</div></div>
  <div class="swatch"><div class="chip" style="background:#be123c;"></div><div class="label">Red Dark</div><div class="hex">#be123c</div></div>
  <div class="swatch"><div class="chip" style="background:#0284c7;"></div><div class="label">Blue</div><div class="hex">#0284c7</div></div>
  <div class="swatch"><div class="chip" style="background:#0369a1;"></div><div class="label">Blue Dark</div><div class="hex">#0369a1</div></div>
  <div class="swatch"><div class="chip" style="background:#0c4a6e;"></div><div class="label">Blue Deep</div><div class="hex">#0c4a6e</div></div>
</div>
</body></html>
