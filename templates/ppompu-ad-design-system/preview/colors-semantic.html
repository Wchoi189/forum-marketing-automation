<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body { margin: 0; padding: 16px; background: #fff; font-family: "Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .item { border-radius: 8px; padding: 10px 12px; font-size: 11px; font-weight: 600; }
  .sub { font-size: 10px; font-weight: 400; margin-top: 2px; opacity: 0.7; }
  h4 { margin: 0 0 8px 0; font-size: 11px; color: #94a3b8; letter-spacing: 0.05em; text-transform: uppercase; }
</style>
</head><body>
<h4>Semantic Color Usage</h4>
<div class="grid">
  <div class="item" style="background:#fff1f2; color:#be123c; border:1px solid #fecaca;">YouTube / Red<div class="sub">Section accent · CTA · Badge</div></div>
  <div class="item" style="background:#f0f9ff; color:#0369a1; border:1px solid #e0f2fe;">Coursera / Blue<div class="sub">Section accent · Featured card</div></div>
  <div class="item" style="background:#f8fafc; color:#1e293b; border:1px solid #e2e8f0;">Default Card<div class="sub">Standard product card bg</div></div>
  <div class="item" style="background:#ffffff; color:#334155; border-left:4px solid #e11d48; border-top:1px solid #e2e8f0; border-right:1px solid #e2e8f0; border-bottom:1px solid #e2e8f0;">Notice Box<div class="sub">필독 / warning content</div></div>
  <div class="item" style="background:#f1f5f9; color:#0f172a; border:1px solid #e2e8f0;">Payment BG<div class="sub">CTA section background</div></div>
  <div class="item" style="background:#e63946; color:#fff; border-radius:8px;">CTA Button<div class="sub">Primary action</div></div>
</div>
</body></html>
