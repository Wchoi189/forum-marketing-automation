<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body { margin: 0; padding: 16px; background: #f8fafc; font-family: "Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif; }
  h4 { margin: 0 0 10px 0; font-size: 11px; color: #94a3b8; letter-spacing: 0.05em; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
</style>
</head><body>
<h4>Product Card — YouTube Premium</h4>
<div class="grid">
  <!-- Standard -->
  <div style="padding:20px;border:1px solid #e2e8f0;border-radius:12px;text-align:center;background:#fff;">
    <span style="font-size:12px;font-weight:600;color:#64748b;display:block;margin-bottom:6px;">Standard Plan</span>
    <div style="font-size:14px;font-weight:700;margin-bottom:4px;color:#1e293b;">6개월 이용권(가족)</div>
    <div style="font-size:22px;font-weight:800;color:#e11d48;margin-bottom:4px;">품절</div>
    <span style="font-size:11px;color:#64748b;">월:4,166원, 일:137원</span>
  </div>
  <!-- Best Choice -->
  <div style="padding:20px;border:2px solid #e11d48;border-radius:12px;text-align:center;background:#fff1f2;position:relative;">
    <div style="position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:#e11d48;color:#fff;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;">BEST CHOICE</div>
    <span style="font-size:12px;font-weight:600;color:#e11d48;display:block;margin-bottom:6px;">Annual Plan</span>
    <div style="font-size:14px;font-weight:700;margin-bottom:4px;color:#1e293b;">12개월 이용권(가족)</div>
    <div style="font-size:22px;font-weight:800;color:#be123c;margin-bottom:4px;">품절</div>
    <span style="font-size:11px;color:#be123c;">월:4,166원, 일:137원</span>
  </div>
  <!-- Independent -->
  <div style="padding:20px;border:2px solid #e2e8f0;border-radius:12px;text-align:center;background:#fff;position:relative;">
    <div style="position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:#e11d48;color:#fff;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;">Independent</div>
    <span style="font-size:12px;font-weight:600;color:#e11d48;display:block;margin-bottom:6px;">Private Plan</span>
    <div style="font-size:14px;font-weight:700;margin-bottom:4px;color:#1e293b;">12개월 이용권(개인)</div>
    <div style="font-size:22px;font-weight:800;color:#be123c;margin-bottom:4px;">55,000원</div>
    <div style="font-size:11px;color:#334155;line-height:1.5;">월 4,583원; 일 151원</div>
  </div>
</div>
</body></html>
