<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body { margin: 0; padding: 16px; background: #fff; font-family: "Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch { width: 80px; }
  .chip { width: 80px; height: 56px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.08); }
  .label { font-size: 10px; color: #334155; margin-top: 4px; font-weight: 600; }
  .hex { font-size: 10px; color: #94a3b8; font-family: monospace; }
  h4 { margin: 0 0 8px 0; font-size: 11px; color: #94a3b8; letter-spacing: 0.05em; text-transform: uppercase; }
</style>
</head><body>
<h4>Neutral / Slate Scale</h4>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#334155;"></div><div class="label">Slate Mid</div><div class="hex">#334155</div></div>
  <div class="swatch"><div class="chip" style="background:#64748b;"></div><div class="label">Slate</div><div class="hex">#64748b</div></div>
  <div class="swatch"><div class="chip" style="background:#94a3b8;"></div><div class="label">Slate Lt</div><div class="hex">#94a3b8</div></div>
  <div class="swatch"><div class="chip" style="background:#cbd5e1;"></div><div class="label">Slate XLt</div><div class="hex">#cbd5e1</div></div>
  <div class="swatch"><div class="chip" style="background:#e2e8f0;"></div><div class="label">Border</div><div class="hex">#e2e8f0</div></div>
  <div class="swatch"><div class="chip" style="background:#f1f5f9;"></div><div class="label">BG Muted</div><div class="hex">#f1f5f9</div></div>
  <div class="swatch"><div class="chip" style="background:#f8fafc;"></div><div class="label">BG Subtle</div><div class="hex">#f8fafc</div></div>
  <div class="swatch"><div class="chip" style="background:#ffffff;"></div><div class="label">White</div><div class="hex">#ffffff</div></div>
</div>
</body></html>
