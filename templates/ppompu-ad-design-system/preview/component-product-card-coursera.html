<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body { margin: 0; padding: 16px; background: #f8fafc; font-family: "Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif; }
  h4 { margin: 0 0 10px 0; font-size: 11px; color: #94a3b8; letter-spacing: 0.05em; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
</style>
</head><body>
<h4>Product Card — Coursera Plus</h4>
<div class="grid">
  <div style="padding:20px;background:#f0f9ff;border-radius:12px;text-align:center;border:1px solid #e0f2fe;">
    <span style="font-size:12px;font-weight:600;color:#64748b;display:block;margin-bottom:6px;">BasicPlan</span>
    <div style="font-size:14px;font-weight:700;color:#1e293b;margin-bottom:4px;">1개월 이용권</div>
    <div style="font-size:22px;font-weight:800;color:#0c4a6e;margin-bottom:4px;">품절</div>
    <span style="font-size:11px;color:#64748b;">(월 25,000원)</span>
  </div>
  <div style="padding:20px;background:#f0f9ff;border-radius:12px;text-align:center;border:1px solid #e0f2fe;">
    <span style="font-size:12px;font-weight:600;color:#64748b;display:block;margin-bottom:6px;">StandardPlan</span>
    <div style="font-size:14px;font-weight:700;color:#1e293b;margin-bottom:4px;">6개월 이용권</div>
    <div style="font-size:22px;font-weight:800;color:#0c4a6e;margin-bottom:4px;">품절</div>
    <span style="font-size:11px;color:#64748b;">월 평균 10,833원</span>
  </div>
  <div style="padding:20px;background:#f0f9ff;border-radius:12px;text-align:center;border:2px solid #0284c7;position:relative;">
    <div style="position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:#0284c7;color:#fff;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;">BEST CHOICE</div>
    <span style="font-size:12px;font-weight:600;color:#0284c7;display:block;margin-bottom:6px;">AnnualPlan</span>
    <div style="font-size:14px;font-weight:700;color:#1e293b;margin-bottom:4px;">12개월 이용권</div>
    <div style="font-size:22px;font-weight:800;color:#075985;margin-bottom:4px;">120,000원</div>
    <span style="font-size:11px;color:#0369a1;">월 평균 9,583원</span>
  </div>
</div>
</body></html>
